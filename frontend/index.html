<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RISS Meta Agent</title>
  <style>
    :root {
      --bg: #f3efe6;
      --panel: #fffaf0;
      --ink: #1f2a30;
      --muted: #66757f;
      --accent: #006a6a;
      --accent-2: #c96f3b;
      --line: #d7d0c4;
    }
    body { margin: 0; font-family: Georgia, "Noto Serif KR", serif; background: linear-gradient(180deg, #efe8d8 0%, #f7f4ed 100%); color: var(--ink); }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 40px 20px 80px; }
    h1 { margin: 0 0 12px; font-size: 44px; line-height: 1.05; }
    p.lead { margin: 0 0 24px; color: var(--muted); font-size: 18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 24px; box-shadow: 0 12px 30px rgba(28, 39, 46, 0.08); margin-bottom: 20px; }
    .grid { display: grid; gap: 16px; grid-template-columns: 1fr 1fr; }
    .grid-wide { display: grid; gap: 16px; grid-template-columns: 1.2fr 0.8fr; }
    label { display: block; font-size: 14px; margin-bottom: 8px; }
    input, button, textarea { width: 100%; box-sizing: border-box; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line); background: white; font: inherit; }
    textarea { min-height: 160px; resize: vertical; }
    button { background: var(--accent); color: white; border: none; cursor: pointer; margin-top: 16px; }
    .secondary { background: var(--accent-2); }
    pre { white-space: pre-wrap; word-break: break-word; background: #f7f6f1; padding: 16px; border-radius: 12px; border: 1px solid var(--line); min-height: 180px; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 10px 8px; border-bottom: 1px solid var(--line); vertical-align: top; font-size: 14px; }
    th { color: var(--muted); font-weight: 600; }
    .badge { display: inline-block; padding: 4px 8px; border-radius: 999px; background: #e6f0ef; color: var(--accent); font-size: 12px; }
    .actions { display: grid; gap: 12px; grid-template-columns: 1fr 1fr 1fr 1fr; }
    @media (max-width: 860px) { .grid, .grid-wide, .actions { grid-template-columns: 1fr; } h1 { font-size: 34px; } }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>교육학 메타분석 지원 AI 에이전트</h1>
    <p class="lead">지속 저장되는 검색 요청, PRISMA, export, 그리고 데모 원문 기반 추출까지 확인하는 현재 프로토타입입니다.</p>

    <div class="panel">
      <label for="query">검색어</label>
      <input id="query" value="협동학습" />
      <div class="actions">
        <button id="run">검색 실행</button>
        <button id="exportCsv" class="secondary">후보 CSV</button>
        <button id="exportPrisma" class="secondary">PRISMA JSON</button>
        <button id="exportMeta" class="secondary">메타분석 CSV</button>
      </div>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>실행 결과</h2>
        <pre id="result">API 실행 전</pre>
      </div>
      <div class="panel">
        <h2>검색 요약</h2>
        <pre id="summary">API 실행 전</pre>
      </div>
    </div>

    <div class="grid-wide">
      <div class="panel">
        <h2>후보 논문</h2>
        <table>
          <thead>
            <tr>
              <th>제목</th>
              <th>소스</th>
              <th>연도</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="candidates">
            <tr><td colspan="4">API 실행 전</td></tr>
          </tbody>
        </table>
      </div>
      <div class="panel">
        <h2>최근 검색 요청</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>검색어</th>
              <th>상태</th>
            </tr>
          </thead>
          <tbody id="searches">
            <tr><td colspan="3">아직 검색 없음</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <div class="panel">
      <h2>데모 원문 텍스트</h2>
      <textarea id="fullText">연구대상은 중학교 2학년 120명이었다. 실험집단 60명과 통제집단 60명으로 구성하였다. 협동학습 기반 수업을 적용한 결과, 학업성취도 사후검사에서 실험집단 평균은 82.4, 표준편차는 10.1이었고 통제집단 평균은 75.2, 표준편차는 11.3이었다. 두 집단 간 차이는 통계적으로 유의하였다(p &lt; .05).</textarea>
      <button id="runExtraction">첫 후보 원문 등록 + 추출 실행</button>
    </div>

    <div class="grid">
      <div class="panel">
        <h2>Export 내용</h2>
        <textarea id="exportContent">아직 생성되지 않음</textarea>
      </div>
      <div class="panel">
        <h2>추출 결과</h2>
        <pre id="extraction">아직 실행되지 않음</pre>
      </div>
    </div>

    <div class="panel">
      <h2>PRISMA</h2>
      <pre id="prisma">API 실행 전</pre>
    </div>
  </div>

  <script>
    const runButton = document.getElementById("run");
    const exportCsvButton = document.getElementById("exportCsv");
    const exportPrismaButton = document.getElementById("exportPrisma");
    const exportMetaButton = document.getElementById("exportMeta");
    const runExtractionButton = document.getElementById("runExtraction");
    const result = document.getElementById("result");
    const summary = document.getElementById("summary");
    const prisma = document.getElementById("prisma");
    const extraction = document.getElementById("extraction");
    const candidatesBody = document.getElementById("candidates");
    const searchesBody = document.getElementById("searches");
    const exportContent = document.getElementById("exportContent");
    const fullText = document.getElementById("fullText");
    let lastSearchId = null;
    let currentCandidates = [];

    function renderCandidates(items) {
      currentCandidates = items;
      if (!items.length) {
        candidatesBody.innerHTML = '<tr><td colspan="4">후보 없음</td></tr>';
        return;
      }
      candidatesBody.innerHTML = items.map(item => `
        <tr>
          <td>${item.title}</td>
          <td><span class="badge">${item.source}</span></td>
          <td>${item.year}</td>
          <td>${item.status}</td>
        </tr>
      `).join("");
    }

    function renderSearches(items) {
      if (!items.length) {
        searchesBody.innerHTML = '<tr><td colspan="3">아직 검색 없음</td></tr>';
        return;
      }
      searchesBody.innerHTML = items.slice(0, 8).map(item => `
        <tr>
          <td>${item.id}</td>
          <td>${item.query_text}</td>
          <td>${item.status}</td>
        </tr>
      `).join("");
    }

    async function loadSearches() {
      const res = await fetch("http://127.0.0.1:8000/api/search-requests");
      const payload = await res.json();
      renderSearches(payload);
    }

    async function loadExport(kind) {
      if (!lastSearchId) {
        exportContent.value = "먼저 검색을 실행하세요.";
        return;
      }
      const map = {
        candidates: `http://127.0.0.1:8000/api/search-requests/${lastSearchId}/exports/candidates.csv`,
        prisma: `http://127.0.0.1:8000/api/search-requests/${lastSearchId}/exports/prisma-counts.json`,
        meta: `http://127.0.0.1:8000/api/search-requests/${lastSearchId}/exports/meta-analysis-ready.csv`
      };
      const res = await fetch(map[kind]);
      const payload = await res.json();
      exportContent.value = payload.content;
    }

    function firstCanonicalCandidate() {
      return currentCandidates.find(item => item.canonical_record_id === item.id) || currentCandidates[0] || null;
    }

    runButton.addEventListener("click", async () => {
      result.textContent = "요청 중...";
      summary.textContent = "요약 대기 중...";
      prisma.textContent = "집계 대기 중...";
      extraction.textContent = "추출 대기 중...";
      exportContent.value = "Export 생성 대기 중...";

      try {
        const createRes = await fetch("http://127.0.0.1:8000/api/search-requests", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query_text: document.getElementById("query").value })
        });
        const created = await createRes.json();
        lastSearchId = created.id;

        const runRes = await fetch(`http://127.0.0.1:8000/api/search-requests/${created.id}/run`, {
          method: "POST"
        });
        const executed = await runRes.json();

        const summaryRes = await fetch(`http://127.0.0.1:8000/api/search-requests/${created.id}/summary`);
        const summaryJson = await summaryRes.json();

        const prismaRes = await fetch(`http://127.0.0.1:8000/api/search-requests/${created.id}/prisma`);
        const prismaJson = await prismaRes.json();

        const candidatesRes = await fetch(`http://127.0.0.1:8000/api/search-requests/${created.id}/candidates`);
        const candidatesJson = await candidatesRes.json();

        result.textContent = JSON.stringify(executed, null, 2);
        summary.textContent = JSON.stringify(summaryJson, null, 2);
        prisma.textContent = JSON.stringify(prismaJson, null, 2);
        renderCandidates(candidatesJson);
        await loadSearches();
        await loadExport("candidates");
      } catch (error) {
        result.textContent = String(error);
        summary.textContent = "오류 발생";
        prisma.textContent = "오류 발생";
        candidatesBody.innerHTML = '<tr><td colspan="4">오류 발생</td></tr>';
      }
    });

    runExtractionButton.addEventListener("click", async () => {
      try {
        const candidate = firstCanonicalCandidate();
        if (!candidate) {
          extraction.textContent = "먼저 검색을 실행해 후보를 만드세요.";
          return;
        }
        await fetch(`http://127.0.0.1:8000/api/candidates/${candidate.id}/full-text`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            file_name: "demo.txt",
            mime_type: "text/plain",
            text_content: fullText.value
          })
        });
        const res = await fetch(`http://127.0.0.1:8000/api/candidates/${candidate.id}/extract`, {
          method: "POST"
        });
        const payload = await res.json();
        extraction.textContent = JSON.stringify(payload, null, 2);
        await loadExport("meta");
      } catch (error) {
        extraction.textContent = String(error);
      }
    });

    exportCsvButton.addEventListener("click", async () => {
      try { await loadExport("candidates"); } catch (error) { exportContent.value = String(error); }
    });

    exportPrismaButton.addEventListener("click", async () => {
      try { await loadExport("prisma"); } catch (error) { exportContent.value = String(error); }
    });

    exportMetaButton.addEventListener("click", async () => {
      try { await loadExport("meta"); } catch (error) { exportContent.value = String(error); }
    });

    loadSearches().catch(() => {});
  </script>
</body>
</html>
